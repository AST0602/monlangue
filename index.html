<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Language Tool</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#F5F5F7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <style>
        :root {
            --bg-color: #F5F5F7;
            --card-color: #FFFFFF;
            --text-primary: #2C2C2E;
            --text-secondary: #8E8E93;
            --border-radius: 16px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Review View */
        #reviewView {
            display: none;
            flex: 1;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .review-card-container {
            width: 100%;
            max-width: 500px;
            perspective: 1000px;
            height: 400px;
            cursor: pointer;
        }

        .review-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .review-card-inner.flipped {
            transform: rotateY(180deg);
        }

        .review-card-front, .review-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background: var(--card-color);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        .review-card-back {
            transform: rotateY(180deg);
            overflow-y: auto;
            justify-content: flex-start;
        }

        .review-card-front h2 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .review-card-back .translation-item {
            width: 100%;
            text-align: left;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #F2F2F7;
        }

        .review-card-back .translation-item:last-child {
            border-bottom: none;
        }

        .review-card-back .lang-label {
            margin-bottom: 4px;
            display: block;
        }

        .review-controls {
            margin-top: 40px;
            display: flex;
            gap: 20px;
        }

        .nav-btn {
            background: var(--card-color);
            border: none;
            padding: 12px 24px;
            border-radius: 100px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
        }

        .review-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .review-progress {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Resume Prompt */
        .resume-prompt {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-primary);
            color: white;
            padding: 16px 24px;
            border-radius: 100px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
            align-items: center;
            gap: 16px;
            z-index: 100;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { transform: translate(-50%, 100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        .resume-prompt button {
            background: white;
            color: var(--text-primary);
            border: none;
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* Top Search Area */
        .search-container {
            position: relative;
            margin-bottom: 24px;
        }

        .main-input {
            width: 100%;
            padding: 20px 60px 20px 24px;
            font-size: 1.1rem;
            border: none;
            border-radius: 20px;
            background-color: var(--card-color);
            color: var(--text-primary);
            box-shadow: var(--shadow);
            outline: none;
            transition: var(--transition);
        }

        .main-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .main-input:focus {
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
        }

        .mic-icon {
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            opacity: 0.6;
            transition: var(--transition);
        }

        .mic-icon:hover {
            opacity: 1;
        }

        /* Category Buttons */
        .mode-tags {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .tag-btn {
            padding: 10px 24px;
            border-radius: 100px;
            border: none;
            background-color: #E8E8ED;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .tag-btn.active {
            background-color: var(--text-primary);
            color: white;
        }

        .tag-btn:hover:not(.active) {
            background-color: #D2D2D7;
        }

        /* Result Cards */
        .results-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .result-card {
            background-color: var(--card-color);
            padding: 32px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            position: relative;
            transition: var(--transition);
        }

        .result-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .lang-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .star-btn {
            background: none;
            border: none;
            color: #D2D2D7;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            transition: var(--transition);
        }

        .star-btn:hover {
            color: #FFD60A; /* A soft yellow for star, but keeping it subtle */
        }

        .star-btn.active {
            color: #FFD60A;
        }

        .card-content {
            font-size: 1.25rem;
            color: var(--text-primary);
            letter-spacing: 0.01em;
            word-break: break-word;
        }

        /* Bottom Controls */
        .bottom-controls {
            margin-top: auto;
            padding-top: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .icon-btn:hover {
            background-color: #E8E8ED;
            color: var(--text-primary);
        }

        .review-toggle {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 100px;
            background-color: #E8E8ED;
            transition: var(--transition);
        }

        .review-toggle:hover {
            background-color: #D2D2D7;
        }

        /* Responsive */
        @media (max-width: 600px) {
            body {
                padding: 24px 16px;
            }
            
            .main-input {
                font-size: 1rem;
                padding: 16px 50px 16px 20px;
            }

            .result-card {
                padding: 24px;
            }

            .card-content {
                font-size: 1.1rem;
            }

            .mode-tags {
                gap: 8px;
            }

            .tag-btn {
                padding: 8px 16px;
                font-size: 0.85rem;
            }
        }

        /* Animation for capsule buttons */
        .tag-btn:active {
            transform: scale(0.95);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: var(--card-color);
            padding: 32px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #E8E8ED;
            background: #F9F9FB;
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--text-secondary);
            background: #FFFFFF;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 32px;
        }

        .btn-primary {
            background: var(--text-primary);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-secondary {
            background: #E8E8ED;
            color: var(--text-secondary);
            border: none;
            padding: 10px 24px;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        /* Loading state */
        .loading-shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
            height: 1.25rem;
            margin-bottom: 8px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Main View -->
        <div id="mainView">
            <!-- Top Search Area -->
            <header class="search-container">
                <input type="text" class="main-input" placeholder="输入中文、English 或 Français...">
                <div class="mic-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                </div>
            </header>

            <!-- Category Buttons -->
            <nav class="mode-tags">
                <button class="tag-btn active" onclick="this.classList.toggle('active')">口语</button>
                <button class="tag-btn" onclick="this.classList.toggle('active')">书面</button>
                <button class="tag-btn" onclick="this.classList.toggle('active')">礼貌</button>
                <button class="tag-btn" onclick="this.classList.toggle('active')">随意</button>
            </nav>

            <!-- Result Cards Area -->
            <main class="results-grid" id="resultsGrid">
                <!-- 动态渲染生成 -->
            </main>
        </div>

        <!-- Review View -->
        <div id="reviewView">
            <div class="review-header">
                <button class="icon-btn" onclick="toggleReviewMode(false)">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    <span>返回</span>
                </button>
                <div class="review-progress" id="reviewProgress">1 / 20</div>
            </div>
            
            <div class="review-card-container" onclick="flipReviewCard()">
                <div class="review-card-inner" id="reviewCardInner">
                    <div class="review-card-front">
                        <h2 id="reviewWord">Word</h2>
                    </div>
                    <div class="review-card-back" id="reviewDetails">
                        <!-- Details filled by JS -->
                    </div>
                </div>
            </div>

            <div class="review-controls">
                <button class="nav-btn" onclick="prevReviewWord(event)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                    <span>上一个</span>
                </button>
                <button class="nav-btn" onclick="nextReviewWord(event)">
                    <span>下一个</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Bottom Controls -->
        <footer class="bottom-controls">
            <button class="icon-btn" onclick="toggleModal(true)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
                <span>设置</span>
            </button>
            <div class="review-toggle" onclick="toggleReviewMode(true)">
                <span>进入复习模式</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </div>
        </footer>
    </div>

    <!-- Resume Prompt -->
    <div class="resume-prompt" id="resumePrompt">
        <span>发现上次复习中断，是否继续？</span>
        <div style="display:flex; gap:8px;">
            <button onclick="resumeReview(true)">继续</button>
            <button onclick="resumeReview(false)" style="background:rgba(255,255,255,0.2); color:white;">重新开始</button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 class="modal-title">API 配置</h2>
            <div class="form-group">
                <label for="apiKey">API Key</label>
                <input type="password" id="apiKey" class="form-control" placeholder="sk-...">
            </div>
            <div class="form-group">
                <label for="baseUrl">Base URL</label>
                <input type="text" id="baseUrl" class="form-control" placeholder="https://api.openai.com/v1">
            </div>
            <div class="form-group">
                <label for="modelName">Model Name</label>
                <input type="text" id="modelName" class="form-control" placeholder="deepseek-chat">
            </div>
            <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: -10px; margin-bottom: 20px;">
                * 云同步将使用您的 AI API Key 作为鉴权凭证，数据存储在您的 Cloudflare KV 中。
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="toggleModal(false)">取消</button>
                <button class="btn-primary" onclick="saveSettings()">保存配置</button>
            </div>
        </div>
    </div>

    <script>
        // Language Configuration
        const enabledLanguages = [
            { code: 'zh', label: '中文' },
            { code: 'en', label: 'ENGLISH' },
            { code: 'fr', label: 'FRANÇAIS' }
        ];

        let currentResultData = null; // Store last AI result for star logic
        let reviewWords = [];
        let currentReviewIndex = 0;

        // Initialization
        window.onload = () => {
            initResultCards();
            loadSettings();
            checkResumeReview();
            registerServiceWorker();
        };

        function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(() => console.log('Service Worker Registered'));
            }
        }

        // Review Mode Logic
        async function toggleReviewMode(show) {
            const mainView = document.getElementById('mainView');
            const reviewView = document.getElementById('reviewView');
            const bottomControls = document.querySelector('.bottom-controls');

            if (show) {
                const words = await fetchNotionDatabase();
                if (words.length === 0) {
                    alert('词库为空或未配置 Notion，请先收藏单词。');
                    return;
                }
                
                // Shuffle and pick 20
                reviewWords = words
                    .sort(() => 0.5 - Math.random())
                    .slice(0, 20)
                    .map(item => ({
                        word: item.properties.Word.title[0]?.plain_text || 'Unknown',
                        translation: item.properties.Translation.rich_text[0]?.plain_text || '',
                        example: item.properties.Example.rich_text[0]?.plain_text || '',
                        scene: item.properties.Scene.select?.name || '常规'
                    }));

                mainView.style.display = 'none';
                reviewView.style.display = 'flex';
                bottomControls.style.display = 'none';
                renderReviewCard();
            } else {
                mainView.style.display = 'block';
                reviewView.style.display = 'none';
                bottomControls.style.display = 'flex';
                // Save progress
                localStorage.setItem('review_checkpoint', JSON.stringify({
                    index: currentReviewIndex,
                    words: reviewWords,
                    timestamp: Date.now()
                }));
            }
        }

        function renderReviewCard() {
            const word = reviewWords[currentReviewIndex];
            document.getElementById('reviewWord').innerText = word.word;
            document.getElementById('reviewProgress').innerText = `${currentReviewIndex + 1} / ${reviewWords.length}`;
            
            const detailsHtml = `
                <div class="translation-item">
                    <span class="lang-label" style="font-size:0.75rem; color:var(--text-secondary); text-transform:uppercase;">释义</span>
                    <div style="font-size:1.1rem; font-weight:600;">${word.translation}</div>
                </div>
                <div class="translation-item">
                    <span class="lang-label" style="font-size:0.75rem; color:var(--text-secondary); text-transform:uppercase;">例句</span>
                    <div style="font-size:0.95rem; color:var(--text-secondary);">${word.example}</div>
                </div>
                <div style="margin-top:auto; font-size:0.8rem; color:var(--text-secondary); opacity:0.6;">
                    场景: ${word.scene}
                </div>
            `;
            document.getElementById('reviewDetails').innerHTML = detailsHtml;
            document.getElementById('reviewCardInner').classList.remove('flipped');
            
            // Save index
            const checkpoint = JSON.parse(localStorage.getItem('review_checkpoint') || '{}');
            checkpoint.index = currentReviewIndex;
            localStorage.setItem('review_checkpoint', JSON.stringify(checkpoint));
        }

        function flipReviewCard() {
            document.getElementById('reviewCardInner').classList.toggle('flipped');
        }

        function nextReviewWord(e) {
            e.stopPropagation();
            if (currentReviewIndex < reviewWords.length - 1) {
                currentReviewIndex++;
                renderReviewCard();
            } else {
                alert('恭喜，已完成本次复习！');
                toggleReviewMode(false);
            }
        }

        function prevReviewWord(e) {
            e.stopPropagation();
            if (currentReviewIndex > 0) {
                currentReviewIndex--;
                renderReviewCard();
            }
        }

        function checkResumeReview() {
            const checkpoint = JSON.parse(localStorage.getItem('review_checkpoint'));
            if (checkpoint && checkpoint.words && checkpoint.words.length > 0) {
                // Show prompt if within 24 hours
                if (Date.now() - checkpoint.timestamp < 24 * 60 * 60 * 1000) {
                    document.getElementById('resumePrompt').style.display = 'flex';
                }
            }
        }

        function resumeReview(confirm) {
            document.getElementById('resumePrompt').style.display = 'none';
            if (confirm) {
                const checkpoint = JSON.parse(localStorage.getItem('review_checkpoint'));
                reviewWords = checkpoint.words;
                currentReviewIndex = checkpoint.index;
                
                const mainView = document.getElementById('mainView');
                const reviewView = document.getElementById('reviewView');
                const bottomControls = document.querySelector('.bottom-controls');
                
                mainView.style.display = 'none';
                reviewView.style.display = 'flex';
                bottomControls.style.display = 'none';
                renderReviewCard();
            } else {
                localStorage.removeItem('review_checkpoint');
            }
        }

        function initResultCards() {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = enabledLanguages.map(lang => `
                <article class="result-card" data-lang-code="${lang.code}">
                    <div class="card-header">
                        <span class="lang-label">${lang.label}</span>
                        <button class="star-btn" onclick="toggleStar('${lang.code}')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                            </svg>
                        </button>
                    </div>
                    <div class="card-content" contenteditable="true" onblur="handleContentEdit('${lang.code}', this)">
                        等待输入...
                    </div>
                </article>
            `).join('');
        }

        // Star Logic
        async function toggleStar(langCode) {
            if (!currentResultData || !currentResultData[langCode]) return;

            const vocab = JSON.parse(localStorage.getItem('my_vocabulary') || '[]');
            const originalText = mainInput.value.trim();
            const langData = currentResultData[langCode];
            
            const itemIndex = vocab.findIndex(v => v.originalText === originalText && v.lang === langCode);
            const card = document.querySelector(`.result-card[data-lang-code="${langCode}"]`);
            const starBtn = card.querySelector('.star-btn');

            if (itemIndex > -1) {
                // Unstar
                vocab.splice(itemIndex, 1);
                starBtn.classList.remove('active');
                localStorage.setItem('my_vocabulary', JSON.stringify(vocab));
            } else {
                // Star
                const entry = {
                    id: Date.now() + Math.random(),
                    originalText: originalText,
                    lang: langCode,
                    translatedText: langData.content,
                    extraInfo: langData.extra,
                    timestamp: new Date().toISOString()
                };
                vocab.push(entry);
                starBtn.classList.add('active');
                
                // 先保存到本地，确保状态持久
                localStorage.setItem('my_vocabulary', JSON.stringify(vocab));
                
                // 后台同步到 Notion
                saveToNotion(entry);
            }
        }

        async function saveToNotion(entry) {
            const token = localStorage.getItem('notion_token');
            const dbId = localStorage.getItem('notion_db_id');
            const aiBaseUrl = localStorage.getItem('ai_base_url') || '';
            
            if (!token || !dbId) {
                console.warn('Notion configuration missing.');
                return;
            }

            // Route notion requests through proxy if needed
            let apiUrl = 'https://api.notion.com/v1/pages';
            if (aiBaseUrl && aiBaseUrl.includes('workers.dev')) {
                const proxyBase = aiBaseUrl.split('/v1')[0];
                apiUrl = `${proxyBase}/notion/v1/pages`;
            }

            const activeTones = Array.from(document.querySelectorAll('.tag-btn.active'))
                                   .map(btn => btn.innerText);
            const scene = activeTones.length > 0 ? activeTones[0] : '常规';

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                        'Notion-Version': '2022-06-28'
                    },
                    body: JSON.stringify({
                        parent: { database_id: dbId },
                        properties: {
                            'Word': {
                                title: [{ text: { content: entry.originalText } }]
                            },
                            'Translation': {
                                rich_text: [{ text: { content: entry.translatedText } }]
                            },
                            'Example': {
                                rich_text: [{ text: { content: entry.extraInfo } }]
                            },
                            'Scene': {
                                select: { name: scene }
                            }
                        }
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'Notion API error');
                }
                // 使用更轻量的提示方式
                console.log('Synced to Notion');
                showToast('已同步至 Notion');
            } catch (err) {
                console.error('Notion Sync Failed:', err);
                showToast(`Notion 同步失败: ${err.message}`, true);
            }
        }

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%);
                background: ${isError ? '#FF3B30' : 'var(--text-primary)'};
                color: white;
                padding: 12px 24px;
                border-radius: 100px;
                font-size: 0.9rem;
                z-index: 2000;
                box-shadow: 0 10px 30px rgba(0,0,0,0.1);
                animation: slideUp 0.3s ease;
            `;
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.5s ease';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        async function fetchNotionDatabase() {
            const token = localStorage.getItem('notion_token');
            const dbId = localStorage.getItem('notion_db_id');
            const aiBaseUrl = localStorage.getItem('ai_base_url');
            
            if (!token || !dbId) {
                alert('请先在设置中配置 Notion Token 和 Database ID');
                return [];
            }

            let apiUrl = `https://api.notion.com/v1/databases/${dbId}/query`;
            if (aiBaseUrl && aiBaseUrl.includes('workers.dev')) {
                const proxyBase = aiBaseUrl.split('/v1')[0];
                apiUrl = `${proxyBase}/notion/v1/databases/${dbId}/query`;
            }

            let allResults = [];
            let hasMore = true;
            let startCursor = undefined;

            try {
                while (hasMore) {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json',
                            'Notion-Version': '2022-06-28'
                        },
                        body: JSON.stringify({
                            start_cursor: startCursor,
                            page_size: 100
                        })
                    });

                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(errData.message || 'Failed to fetch from Notion');
                    }

                    const data = await response.json();
                    allResults = [...allResults, ...data.results];
                    hasMore = data.has_more;
                    startCursor = data.next_cursor;
                }
                return allResults;
            } catch (err) {
                console.error('Fetch Notion Database Failed:', err);
                alert(`读取 Notion 失败: ${err.message}`);
                return [];
            }
        }

        function updateStarUI(originalText) {
            const vocab = JSON.parse(localStorage.getItem('my_vocabulary') || '[]');
            enabledLanguages.forEach(lang => {
                const card = document.querySelector(`.result-card[data-lang-code="${lang.code}"]`);
                if (!card) return;
                const starBtn = card.querySelector('.star-btn');
                const isStarred = vocab.some(v => v.originalText === originalText && v.lang === lang.code);
                starBtn.classList.toggle('active', isStarred);
            });
        }

        // Content Edit Logic
        function handleContentEdit(langCode, element) {
            console.log(`Edited ${langCode}: ${element.innerText}`);
            // Future: sync back to localStorage if starred
        }

        // Storage Logic
        function saveSettings() {
            const apiKey = document.getElementById('apiKey').value;
            let baseUrl = document.getElementById('baseUrl').value.trim();
            const modelName = document.getElementById('modelName').value;
            
            if (baseUrl.endsWith('/')) {
                baseUrl = baseUrl.replace(/\/+$/, "");
            }

            localStorage.setItem('ai_api_key', apiKey);
            localStorage.setItem('ai_base_url', baseUrl || 'https://api.openai.com/v1');
            localStorage.setItem('ai_model_name', modelName || 'deepseek-chat');
            
            toggleModal(false);
            showToast('配置已保存');
        }

        function loadSettings() {
            document.getElementById('apiKey').value = localStorage.getItem('ai_api_key') || '';
            document.getElementById('baseUrl').value = localStorage.getItem('ai_base_url') || 'https://api.openai.com/v1';
            document.getElementById('modelName').value = localStorage.getItem('ai_model_name') || 'deepseek-chat';
        }

        function toggleModal(show) {
            document.getElementById('modalOverlay').style.display = show ? 'flex' : 'none';
            if(show) loadSettings();
        }

        // AI Request Logic
        const mainInput = document.querySelector('.main-input');
        
        mainInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && mainInput.value.trim()) {
                handleAIRequest(mainInput.value.trim());
            }
        });

        async function handleAIRequest(userInput) {
            const apiKey = localStorage.getItem('ai_api_key');
            const baseUrl = localStorage.getItem('ai_base_url');
            const modelName = localStorage.getItem('ai_model_name') || 'deepseek-chat';

            if (!apiKey) {
                alert('请先在设置中配置 API Key');
                toggleModal(true);
                return;
            }

            const activeTones = Array.from(document.querySelectorAll('.tag-btn.active'))
                                   .map(btn => btn.innerText);
            
            let finalPrompt = userInput;
            if (activeTones.length > 0) {
                finalPrompt += `（请注意：翻译和例句需符合${activeTones.join('、')}场景）`;
            }

            renderLoading();

            // Dynamic System Prompt
            const langRules = enabledLanguages.map(l => `"${l.code}": { "content": "内容", "extra": "音标/补充" }`).join(',\n  ');
            const systemPrompt = `你是一个精通${enabledLanguages.map(l => l.label).join('、')}的多语专家。
如果输入是单词或词组，必须返回它在所有设定语言中的核心意思、音标及2个实用例句。
如果输入是句子，请直接提供地道的多语互译。
你必须严格、只能输出合法的 JSON 字符串，绝对不要包含 \`\`\`json 等 Markdown 标记，不要有任何前言、后记或解释。格式如下：
{
  ${langRules}
}`;

            try {
                const response = await fetch(`${baseUrl}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: modelName,
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: finalPrompt }
                        ]
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || `HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                let content = data.choices[0].message.content;
                content = content.replace(/```json\s?|\s?```/g, '').trim();
                
                try {
                    currentResultData = JSON.parse(content);
                    renderResults(currentResultData);
                    updateStarUI(userInput);
                } catch (parseError) {
                    throw new Error('AI 返回格式错误，无法解析 JSON');
                }

            } catch (error) {
                console.error('AI Request Error:', error);
                let msg = error.message;
                if (msg === 'Failed to fetch') {
                    msg = '网络连接失败或跨域(CORS)被拦截。建议：1.检查网络 2.使用支持跨域的中转API 3.安装"Allow CORS"浏览器插件。';
                }
                showErrorOnCards(msg);
            }
        }

        function renderLoading() {
            document.querySelectorAll('.card-content').forEach(el => {
                el.innerHTML = '<div class="loading-shimmer"></div><div class="loading-shimmer" style="width:80%"></div>';
            });
        }

        function renderResults(data) {
            enabledLanguages.forEach(lang => {
                const card = document.querySelector(`.result-card[data-lang-code="${lang.code}"]`);
                if (!card) return;
                const contentEl = card.querySelector('.card-content');
                const langData = data[lang.code];
                
                if (langData) {
                    contentEl.innerHTML = `
                        <div style="font-weight: 500; margin-bottom: 8px;">${langData.content}</div>
                        <div style="font-size: 0.9rem; color: var(--text-secondary); line-height: 1.4;">${langData.extra}</div>
                    `;
                }
            });
        }

        function showErrorOnCards(message) {
            document.querySelectorAll('.card-content').forEach(el => {
                el.innerHTML = `<div style="color: #FF3B30; font-size: 0.9rem;">错误: ${message}</div>`;
            });
        }
    </script>
</body>
