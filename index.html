<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Language Tool</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#F5F5F7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <style>
        :root {
            --bg-color: #F5F5F7;
            --card-color: #FFFFFF;
            --text-primary: #2C2C2E;
            --text-secondary: #8E8E93;
            --border-radius: 16px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 20px 20px 40px 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #mainView {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .results-grid {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 32px;
        }

        /* Review View */
        #reviewView {
            display: none;
            flex: 1;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .review-card-container {
            width: 100%;
            max-width: 500px;
            perspective: 1000px;
            height: 400px;
            cursor: pointer;
        }

        .review-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .review-card-inner.flipped {
            transform: rotateY(180deg);
        }

        .review-card-front, .review-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background: var(--card-color);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        .review-card-back {
            transform: rotateY(180deg);
            overflow-y: auto;
            justify-content: flex-start;
        }

        .review-card-front h2 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .review-card-back .translation-item {
            width: 100%;
            text-align: left;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #F2F2F7;
        }

        .review-card-back .translation-item:last-child {
            border-bottom: none;
        }

        .review-card-back .lang-label {
            margin-bottom: 4px;
            display: block;
        }

        .review-controls {
            margin-top: 40px;
            display: flex;
            gap: 20px;
        }

        .nav-btn {
            background: var(--card-color);
            border: none;
            padding: 12px 24px;
            border-radius: 100px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
        }

        .review-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .review-progress {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Resume Prompt */
        .resume-prompt {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-primary);
            color: white;
            padding: 16px 24px;
            border-radius: 100px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
            align-items: center;
            gap: 16px;
            z-index: 100;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { transform: translate(-50%, 100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        .resume-prompt button {
            background: white;
            color: var(--text-primary);
            border: none;
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* Top Search Area */
        .search-container {
            position: relative;
            margin-bottom: 24px;
        }

        .main-input {
            width: 100%;
            padding: 20px 60px 20px 24px;
            font-size: 1.1rem;
            border: none;
            border-radius: 20px;
            background-color: var(--card-color);
            color: var(--text-primary);
            box-shadow: var(--shadow);
            outline: none;
            transition: var(--transition);
        }

        .main-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .main-input:focus {
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
        }

        .mic-icon {
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            opacity: 0.6;
            transition: var(--transition);
        }

        .mic-icon:hover {
            opacity: 1;
        }

        /* Category Buttons */
        .mode-tags {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .tag-btn {
            padding: 10px 24px;
            border-radius: 100px;
            border: none;
            background-color: #E8E8ED;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .tag-btn.active {
            background-color: var(--text-primary);
            color: white;
        }

        .tag-btn:hover:not(.active) {
            background-color: #D2D2D7;
        }

        /* Result Cards */
        .results-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .result-card {
            background-color: var(--card-color);
            padding: 32px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            position: relative;
            transition: var(--transition);
        }

        .result-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .lang-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .star-btn {
            background: none;
            border: none;
            color: #D2D2D7;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            transition: var(--transition);
        }

        .star-btn:hover {
            color: #FFD60A;
        }

        .star-btn.active {
            color: #FFD60A;
        }

        .card-content {
            font-size: 1.25rem;
            color: var(--text-primary);
            letter-spacing: 0.01em;
            word-break: break-word;
        }

        /* Bottom Controls */
        .bottom-controls {
            margin-top: auto;
            padding-top: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .icon-btn:hover {
            background-color: #E8E8ED;
            color: var(--text-primary);
        }

        .review-toggle {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 100px;
            background-color: #E8E8ED;
            transition: var(--transition);
        }

        .review-toggle:hover {
            background-color: #D2D2D7;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: var(--card-color);
            padding: 32px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #E8E8ED;
            background: #F9F9FB;
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--text-secondary);
            background: #FFFFFF;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 32px;
        }

        .btn-primary {
            background: var(--text-primary);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-secondary {
            background: #E8E8ED;
            color: var(--text-secondary);
            border: none;
            padding: 10px 24px;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        /* Loading shimmer */
        .loading-shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
            height: 1.25rem;
            margin-bottom: 8px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Main View -->
        <div id="mainView">
            <main class="results-grid" id="resultsGrid">
                <!-- Dynamic cards -->
            </main>

            <nav class="mode-tags" style="margin-bottom: 12px;">
                <button class="tag-btn" onclick="this.classList.toggle('active')">Formel</button>
                <button class="tag-btn active" onclick="this.classList.toggle('active')">Standard</button>
                <button class="tag-btn" onclick="this.classList.toggle('active')">Oral</button>
            </nav>

            <header class="search-container">
                <input type="text" class="main-input" placeholder="输入中文、English 或 Français...">
                <div class="mic-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                </div>
            </header>
        </div>

        <!-- Review View -->
        <div id="reviewView">
            <div class="review-header">
                <button class="icon-btn" onclick="toggleReviewMode(false)">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    <span>返回</span>
                </button>
                <div class="review-progress" id="reviewProgress">1 / 0</div>
            </div>
            <div class="review-card-container" onclick="flipReviewCard()">
                <div class="review-card-inner" id="reviewCardInner">
                    <div class="review-card-front">
                        <h2 id="reviewWord">加载中...</h2>
                    </div>
                    <div class="review-card-back" id="reviewDetails">
                        <!-- Details -->
                    </div>
                </div>
            </div>
            <div class="review-controls">
                <button class="nav-btn" onclick="prevReviewWord(event)">上一个</button>
                <button class="nav-btn" onclick="nextReviewWord(event)">下一个</button>
            </div>
        </div>

        <footer class="bottom-controls">
            <button class="icon-btn" onclick="toggleModal(true)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
                <span>设置</span>
            </button>
            <div class="review-toggle" onclick="toggleReviewMode(true)">
                <span>进入复习模式</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </div>
        </footer>
    </div>

    <!-- Resume Prompt -->
    <div class="resume-prompt" id="resumePrompt">
        <span>发现上次复习中断，是否继续？</span>
        <div style="display:flex; gap:8px;">
            <button onclick="resumeReview(true)">继续</button>
            <button onclick="resumeReview(false)" style="background:rgba(255,255,255,0.2); color:white;">重新开始</button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 class="modal-title">API 配置</h2>
            <div class="form-group">
                <label for="apiKey">API Key</label>
                <input type="password" id="apiKey" class="form-control" placeholder="sk-...">
            </div>
            <div class="form-group">
                <label for="baseUrl">Base URL</label>
                <input type="text" id="baseUrl" class="form-control" placeholder="https://api.openai.com/v1">
            </div>
            <div class="form-group">
                <label for="modelName">Model Name</label>
                <input type="text" id="modelName" class="form-control" placeholder="deepseek-chat">
            </div>
            <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: -10px; margin-bottom: 20px;">
                * 云同步将使用您的 AI API Key 作为凭证，数据存储在您的 Cloudflare KV 中。
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="toggleModal(false)">取消</button>
                <button class="btn-primary" onclick="saveSettings()">保存配置</button>
            </div>
        </div>
    </div>

    <script>
        const enabledLanguages = [
            { code: 'zh', label: '中文' },
            { code: 'en', label: 'ENGLISH' },
            { code: 'fr', label: 'FRANÇAIS' }
        ];

        let currentResultData = null;
        let reviewWords = [];
        let currentReviewIndex = 0;

        window.onload = () => {
            initResultCards();
            loadSettings();
            checkResumeReview();
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./service-worker.js');
            }
        };

        function initResultCards() {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = enabledLanguages.map(lang => `
                <article class="result-card" data-lang-code="${lang.code}">
                    <div class="card-header">
                        <span class="lang-label">${lang.label}</span>
                        <button class="star-btn" onclick="toggleStar('${lang.code}')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                            </svg>
                        </button>
                    </div>
                    <div class="card-content" contenteditable="true">等待输入...</div>
                </article>
            `).join('');
        }

        async function syncToCloud() {
            const apiKey = localStorage.getItem('ai_api_key');
            const baseUrl = localStorage.getItem('ai_base_url');
            const vocab = localStorage.getItem('my_vocabulary') || '[]';
            if (!apiKey || !baseUrl || !baseUrl.includes('workers.dev')) return;

            const syncUrl = `${baseUrl.split('/v1')[0]}/sync`;
            try {
                await fetch(syncUrl, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                    body: vocab
                });
                showToast('云端同步成功');
            } catch (e) { console.error('Sync failed', e); }
        }

        async function fetchFromCloud() {
            const apiKey = localStorage.getItem('ai_api_key');
            const baseUrl = localStorage.getItem('ai_base_url');
            if (!apiKey || !baseUrl || !baseUrl.includes('workers.dev')) return null;

            const syncUrl = `${baseUrl.split('/v1')[0]}/sync`;
            try {
                const res = await fetch(syncUrl, { headers: { 'Authorization': `Bearer ${apiKey}` } });
                const data = await res.json();
                if (Array.isArray(data)) {
                    localStorage.setItem('my_vocabulary', JSON.stringify(data));
                    return data;
                }
            } catch (e) { console.error('Fetch failed', e); }
            return null;
        }

        async function toggleStar(langCode) {
            if (!currentResultData || !currentResultData[langCode]) return;
            const vocab = JSON.parse(localStorage.getItem('my_vocabulary') || '[]');
            const text = document.querySelector('.main-input').value.trim();
            const idx = vocab.findIndex(v => v.originalText === text && v.lang === langCode);
            const btn = document.querySelector(`.result-card[data-lang-code="${langCode}"] .star-btn`);

            if (idx > -1) {
                vocab.splice(idx, 1);
                btn.classList.remove('active');
            } else {
                vocab.push({
                    originalText: text, lang: langCode,
                    translatedText: currentResultData[langCode].content,
                    extraInfo: currentResultData[langCode].extra,
                    timestamp: new Date().toISOString()
                });
                btn.classList.add('active');
            }
            localStorage.setItem('my_vocabulary', JSON.stringify(vocab));
            syncToCloud();
        }

        async function toggleReviewMode(show) {
            if (show) {
                showToast('同步云端词库...');
                await fetchFromCloud();
                const vocab = JSON.parse(localStorage.getItem('my_vocabulary') || '[]');
                if (vocab.length === 0) {
                    showToast('词库为空，请先收藏单词', true);
                    return;
                }
                reviewWords = vocab.sort(() => 0.5 - Math.random()).slice(0, 20);
                document.getElementById('mainView').style.display = 'none';
                document.getElementById('reviewView').style.display = 'flex';
                document.querySelector('.bottom-controls').style.display = 'none';
                renderReviewCard();
            } else {
                document.getElementById('mainView').style.display = 'block';
                document.getElementById('reviewView').style.display = 'none';
                document.querySelector('.bottom-controls').style.display = 'flex';
                localStorage.setItem('review_checkpoint', JSON.stringify({
                    index: currentReviewIndex, words: reviewWords, timestamp: Date.now()
                }));
            }
        }

        function renderReviewCard() {
            const word = reviewWords[currentReviewIndex];
            document.getElementById('reviewWord').innerText = word.originalText;
            document.getElementById('reviewProgress').innerText = `${currentReviewIndex + 1} / ${reviewWords.length}`;
            document.getElementById('reviewDetails').innerHTML = `
                <div class="translation-item">
                    <span class="lang-label">释义 (${word.lang})</span>
                    <div style="font-weight:600;">${word.translatedText}</div>
                </div>
                <div class="translation-item">
                    <span class="lang-label">例句</span>
                    <div style="color:var(--text-secondary);">${word.extraInfo}</div>
                </div>
            `;
            document.getElementById('reviewCardInner').classList.remove('flipped');
        }

        function flipReviewCard() { document.getElementById('reviewCardInner').classList.toggle('flipped'); }
        function nextReviewWord(e) {
            e.stopPropagation();
            if (currentReviewIndex < reviewWords.length - 1) {
                currentReviewIndex++; renderReviewCard();
            } else {
                showToast('复习完成！'); toggleReviewMode(false);
            }
        }
        function prevReviewWord(e) {
            e.stopPropagation();
            if (currentReviewIndex > 0) {
                currentReviewIndex--; renderReviewCard();
            }
        }

        function saveSettings() {
            const key = document.getElementById('apiKey').value;
            let url = document.getElementById('baseUrl').value.trim().replace(/\/+$/, "");
            const model = document.getElementById('modelName').value;
            localStorage.setItem('ai_api_key', key);
            localStorage.setItem('ai_base_url', url || 'https://api.openai.com/v1');
            localStorage.setItem('ai_model_name', model || 'deepseek-chat');
            toggleModal(false);
            showToast('配置已保存');
        }

        function loadSettings() {
            document.getElementById('apiKey').value = localStorage.getItem('ai_api_key') || '';
            document.getElementById('baseUrl').value = localStorage.getItem('ai_base_url') || 'https://api.openai.com/v1';
            document.getElementById('modelName').value = localStorage.getItem('ai_model_name') || 'deepseek-chat';
        }

        function toggleModal(show) { document.getElementById('modalOverlay').style.display = show ? 'flex' : 'none'; }

        document.querySelector('.main-input').onkeypress = async (e) => {
            if (e.key === 'Enter' && e.target.value.trim()) {
                const text = e.target.value.trim();
                const key = localStorage.getItem('ai_api_key');
                const url = localStorage.getItem('ai_base_url');
                if (!key) { showToast('请先配置 API Key', true); toggleModal(true); return; }

                document.querySelectorAll('.card-content').forEach(el => el.innerHTML = '<div class="loading-shimmer"></div>');
                const tones = Array.from(document.querySelectorAll('.tag-btn.active')).map(b => b.innerText).join('、');
                const prompt = `你是一个精通中、英、法专家。输入：${text}。场景：${tones}。请严格返回 JSON：{ "zh": {"content":"", "extra":""}, "en":..., "fr":... }`;

                try {
                    const res = await fetch(`${url}/chat/completions`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                        body: JSON.stringify({
                            model: localStorage.getItem('ai_model_name') || 'deepseek-chat',
                            messages: [{ role: 'system', content: prompt }]
                        })
                    });
                    const data = await res.json();
                    let content = data.choices[0].message.content.replace(/```json\s?|\s?```/g, '').trim();
                    currentResultData = JSON.parse(content);
                    enabledLanguages.forEach(lang => {
                        const el = document.querySelector(`.result-card[data-lang-code="${lang.code}"] .card-content`);
                        const d = currentResultData[lang.code];
                        el.innerHTML = `<div style="font-weight:500;">${d.content}</div><div style="font-size:0.9rem;color:var(--text-secondary);">${d.extra}</div>`;
                    });
                    const vocab = JSON.parse(localStorage.getItem('my_vocabulary') || '[]');
                    enabledLanguages.forEach(l => {
                        const isStarred = vocab.some(v => v.originalText === text && v.lang === l.code);
                        document.querySelector(`.result-card[data-lang-code="${l.code}"] .star-btn`).classList.toggle('active', isStarred);
                    });
                } catch (err) {
                    document.querySelectorAll('.card-content').forEach(el => el.innerHTML = `<div style="color:#FF3B30;">错误: ${err.message}</div>`);
                }
            }
        };

        function showToast(m, isErr = false) {
            const t = document.createElement('div');
            t.style.cssText = `position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:${isErr?'#FF3B30':'#2C2C2E'};color:white;padding:12px 24px;border-radius:100px;font-size:0.9rem;z-index:2000;box-shadow:0 10px 30px rgba(0,0,0,0.1);`;
            t.innerText = m; document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function checkResumeReview() {
            const cp = JSON.parse(localStorage.getItem('review_checkpoint'));
            if (cp && Date.now() - cp.timestamp < 86400000) document.getElementById('resumePrompt').style.display = 'flex';
        }
        function resumeReview(c) {
            document.getElementById('resumePrompt').style.display = 'none';
            if (c) {
                const cp = JSON.parse(localStorage.getItem('review_checkpoint'));
                reviewWords = cp.words; currentReviewIndex = cp.index;
                toggleReviewMode(true);
            } else localStorage.removeItem('review_checkpoint');
        }
    </script>
</body>
</html>
